name: KodKampus Editor Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: TurboWarp scratch-gui klonla
        run: git clone --depth 1 https://github.com/TurboWarp/scratch-gui.git gui

      - name: Node 18 kur
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: KodKampus yamasi (Kaydet/Gonder + iframe izni)
        working-directory: gui
        run: |
          echo "" | base64 -d > src/playground/render-gui.jsx
          sed -i 's/const isInvalidEmbed = window.parent !== window;/const isInvalidEmbed = false;/' src/playground/render-interface.jsx
          echo "=== yama kontrolu ==="
          grep -n "kkOnVmInit" src/playground/render-gui.jsx | head -1
          grep -n "isInvalidEmbed = false" src/playground/render-interface.jsx | head -1

      - name: Bagimliliklari kur
        working-directory: gui
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Editoru derle (/editor/ alt klasoru icin)
        working-directory: gui
        env:
          NODE_ENV: production
          ROOT: /editor/
          STATIC_PATH: /editor/static
          NODE_OPTIONS: --openssl-legacy-provider --max-old-space-size=4096
        run: npm run build

      - name: Derlenen editoru yukle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: kodkampus-editor
          path: gui/build
